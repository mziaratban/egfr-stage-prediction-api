name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI image
        run: docker build -f Dockerfile.fastapi -t fastapi-test .

      - name: Build Streamlit image
        run: docker build -f Dockerfile.streamlit -t streamlit-test .

      - name: Run docker compose test build
        run: docker compose build
