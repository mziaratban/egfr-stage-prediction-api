name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |

            cd /data/home/majid/Docker_xgb

            git pull

            docker stop egfr-api || true

            docker rm egfr-api || true

            docker build -t egfr-api .

            docker run -d \
              --name egfr-api \
              -p 8000:8000 \
              egfr-api
